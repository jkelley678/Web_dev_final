<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackson Kelley</title>
  <meta name="description" content="Personal site for Jackson Kelley." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <nav class="site-nav" aria-label="Primary navigation">
      <div class="container">

        <a href="#hero" class="nav-logo" data-string="nav.logo">JK</a>



        <ul class="nav-links" id="nav-links" role="list">
          <li><a href="#about"    data-string="nav.about">About</a></li>
          <li><a href="#resume"   data-string="nav.resume">Résumé</a></li>
          <li><a href="#projects" data-string="nav.projects">Projects</a></li>
          <li><a href="#contact"  data-string="nav.contact">Contact</a></li>
        </ul>

        <nav class="lang-switcher" aria-label="Language switcher">
          <ul role="list">
            <li><button class="lang-btn is-active" data-lang="en" aria-current="true"  aria-label="English">EN</button></li>
            <li><button class="lang-btn"           data-lang="es" aria-current="false" aria-label="Español">ES</button></li>
            <li><button class="lang-btn"           data-lang="de" aria-current="false" aria-label="Deutsch">DE</button></li>
            </ul>
        </nav>

      </div>
    </nav>
  </header>

  <main>
    <section id="hero" aria-labelledby="hero-name">
        <div class="container">
            <div class="hero-content">

            <p class="hero-greeting" data-string="hero.greeting">Hi, I'm</p>

            <h1 id="hero-name" class="hero-name" data-string="hero.name">
                Jackson Kelley
            </h1>

            <p class="hero-tagline" data-string="hero.tagline">
                Placeholder Placeholder Placeholder
            </p>

            <nav class="hero-cta" aria-label="Hero calls to action">
                <a href="#projects" class="btn btn-primary"   data-string="hero.ctaPrimary">View My Work</a>
                <a href="#contact"  class="btn btn-secondary" data-string="hero.ctaSecondary">Get in Touch</a>
            </nav>

            </div>
        </div>
    </section>
    <section id="about" class="site-section" aria-labelledby="about-heading">
    <div class="container">

        <div class="section-heading">
        <span class="section-label" data-string="about.sectionLabel">About</span>
        <h2 id="about-heading" data-string="about.heading">A little about me</h2>
        </div>

        <div class="about-grid">

        <aside aria-label="Profile photo placeholder">
            <div class="about-photo-placeholder" aria-hidden="true"></div>
        </aside>

        <div class="about-text">
            <p data-string="about.paragraphs.0">Placeholder paragraph one.</p>
            <p data-string="about.paragraphs.1">Placeholder paragraph two.</p>
            <p data-string="about.paragraphs.2">Placeholder paragraph three.</p>
        </div>

        </div>
    </div>
    </section>


  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
